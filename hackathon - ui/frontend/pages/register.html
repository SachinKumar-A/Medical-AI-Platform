<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register · MediScan AI</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--gray-50) 0%, white 100%);
            padding: 20px;
        }
        
        .auth-card {
            background: white;
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            padding: 48px;
            width: 100%;
            max-width: 520px;
        }
        
        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }
        
        .auth-header .logo {
            justify-content: center;
            margin-bottom: 24px;
        }
        
        .auth-header h1 {
            font-size: 28px;
            color: var(--gray-900);
            margin-bottom: 8px;
        }
        
        .auth-header p {
            color: var(--gray-500);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: var(--gray-700);
            margin-bottom: 8px;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--gray-200);
            border-radius: var(--radius-md);
            font-size: 15px;
            transition: all 0.2s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(43, 110, 240, 0.1);
        }
        
        .terms {
            margin: 24px 0;
        }
        
        .terms label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gray-600);
            font-size: 14px;
        }
        
        .btn-block {
            width: 100%;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 24px;
            color: var(--gray-500);
        }
        
        .auth-footer a {
            color: var(--secondary);
            text-decoration: none;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo">
                    <span class="logo-icon">⚕️</span>
                    <span>MediScan</span>
                    <span class="logo-badge">AI</span>
                </div>
                <h1>Create account</h1>
                <p>Join the future of medical diagnosis</p>
            </div>
            
            <form id="registerForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>First name</label>
                        <input type="text" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label>Last name</label>
                        <input type="text" placeholder="Doe" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Email address</label>
                    <input type="email" placeholder="doctor@hospital.com" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                    <div class="form-group">
                        <label>Confirm password</label>
                        <input type="password" placeholder="••••••••" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Specialty</label>
                        <select>
                            <option>Radiology</option>
                            <option>Oncology</option>
                            <option>Cardiology</option>
                            <option>Neurology</option>
                            <option>General Medicine</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>License number</label>
                        <input type="text" placeholder="MED-12345">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Hospital/Institution</label>
                    <input type="text" placeholder="City General Hospital">
                </div>
                
                <div class="terms">
                    <label>
                        <input type="checkbox" required> I agree to the 
                        <a href="#">Terms of Service</a> and 
                        <a href="#">Privacy Policy</a>
                    </label>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block btn-large">Create Account</button>
            </form>
            
            <div class="auth-footer">
                Already have an account? <a href="login.html">Sign in</a>
            </div>
        </div>
    </div>
    
    <script src="../js/auth.js"></script>
</body>
</html>
