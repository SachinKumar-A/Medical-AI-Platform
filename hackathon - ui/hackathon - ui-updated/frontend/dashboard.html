<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard · MediScan AI</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* Settings Panel */
        .settings-panel {
            position: fixed;
            top: 0;
            right: -400px;
            width: 380px;
            height: 100vh;
            background: white;
            box-shadow: -5px 0 30px rgba(0,0,0,0.1);
            transition: right 0.3s ease;
            z-index: 1000;
            display: flex;
            flex-direction: column;
        }
        
        .settings-panel.open {
            right: 0;
        }
        
        .settings-header {
            padding: 24px;
            border-bottom: 1px solid var(--gray-200);
            background: var(--primary);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .settings-header h2 {
            font-size: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .settings-close {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }
        
        .settings-close:hover {
            background: rgba(255,255,255,0.3);
            transform: rotate(90deg);
        }
        
        .settings-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }
        
        .settings-section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--gray-200);
        }
        
        .settings-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
        }
        
        .settings-item-label {
            font-size: 14px;
            color: var(--gray-700);
        }
        
        .settings-item-desc {
            font-size: 12px;
            color: var(--gray-500);
        }
        
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 24px;
        }
        
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 2px;
            bottom: 2px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }
        
        input:checked + .slider {
            background-color: var(--secondary);
        }
        
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        
        .settings-footer {
            padding: 20px 24px;
            border-top: 1px solid var(--gray-200);
            background: var(--gray-50);
        }
        
        .save-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .save-btn:hover {
            background: var(--primary-light);
        }

        /* Dark Mode - Complete Theme */
        body.dark-mode {
            background-color: #1a1a1a;
        }
        
        body.dark-mode .dashboard-container {
            background-color: #1a1a1a;
        }
        
        body.dark-mode .dashboard-sidebar {
            background: #2d2d2d;
        }
        
        body.dark-mode .sidebar-nav .nav-item {
            color: #e0e0e0;
        }
        
        body.dark-mode .sidebar-nav .nav-item:hover {
            background: #404040;
        }
        
        body.dark-mode .sidebar-nav .nav-item.active {
            background: var(--secondary);
            color: white;
        }
        
        body.dark-mode .main-content,
        body.dark-mode .dashboard-main {
            background-color: #1a1a1a;
        }
        
        body.dark-mode .stat-card {
            background: #2d2d2d;
            color: #ffffff;
            border-color: #404040;
        }
        
        body.dark-mode .stat-card h3 {
            color: #e0e0e0;
        }
        
        body.dark-mode .stat-card .stat-value {
            color: #ffffff;
        }
        
        body.dark-mode .recent-analyses {
            background: #2d2d2d;
            color: #ffffff;
            border-color: #404040;
        }
        
        body.dark-mode .recent-analyses h2 {
            color: #ffffff;
        }
        
        body.dark-mode .region-card {
            background: #2d2d2d;
            color: #ffffff;
            border-color: #404040;
        }
        
        body.dark-mode .region-card.active {
            background: #363636;
            border-color: var(--secondary);
        }
        
        body.dark-mode .region-card .region-name,
        body.dark-mode .region-card div {
            color: #ffffff;
        }
        
        body.dark-mode .rules-card {
            background: #2d2d2d;
            color: #ffffff;
            border-color: #404040;
        }
        
        body.dark-mode .rules-card .rules-title {
            color: #ffffff;
        }
        
        body.dark-mode .rules-card li {
            color: #e0e0e0;
        }
        
        body.dark-mode .example-card {
            background: #363636;
            border-color: #404040;
        }
        
        body.dark-mode .example-card .example-label {
            color: #ffffff;
        }
        
        body.dark-mode .example-card .example-desc {
            color: #b0b0b0;
        }
        
        body.dark-mode .upload-section {
            background: #2d2d2d;
            color: #ffffff;
            border-color: #404040;
        }
        
        body.dark-mode .upload-section h2,
        body.dark-mode .upload-section h3 {
            color: #ffffff;
        }
        
        body.dark-mode .upload-area {
            background: #363636;
            border-color: #404040;
            color: #e0e0e0;
        }
        
        body.dark-mode .upload-area:hover {
            background: #404040;
            border-color: var(--secondary);
        }
        
        body.dark-mode .preview-section {
            background: #2d2d2d;
        }
        
        body.dark-mode .preview-section h3 {
            color: #ffffff;
        }
        
        body.dark-mode .preview-item {
            background: #363636;
            border-color: #404040;
        }
        
        body.dark-mode .preview-item .preview-name {
            color: #ffffff;
        }
        
        body.dark-mode .results-card {
            background: #2d2d2d;
            color: #ffffff;
            border-color: #404040;
        }
        
        body.dark-mode .results-card h2,
        body.dark-mode .results-card h3,
        body.dark-mode .results-card h4 {
            color: #ffffff;
        }
        
        body.dark-mode .result-table {
            background: #363636;
        }
        
        body.dark-mode .result-table th {
            background: #404040;
            color: #ffffff;
        }
        
        body.dark-mode .result-table td {
            color: #e0e0e0;
            border-color: #404040;
        }
        
        body.dark-mode .result-explanation {
            background: #363636;
            color: #e0e0e0;
        }
        
        body.dark-mode .history-table {
            background: #2d2d2d;
        }
        
        body.dark-mode .history-table th {
            background: #404040;
            color: #ffffff;
        }
        
        body.dark-mode .history-table td {
            color: #e0e0e0;
            border-color: #404040;
        }
        
        body.dark-mode .history-table tr:hover {
            background: #363636;
        }
        
        body.dark-mode .dashboard-header h1 {
            color: #ffffff;
        }
        
        body.dark-mode .date-badge {
            background: #2d2d2d;
            color: #e0e0e0;
            border: 1px solid #404040;
        }
        
        body.dark-mode .settings-icon {
            color: #ffffff;
        }
        
        body.dark-mode .settings-icon:hover {
            background: #404040;
        }
        
        body.dark-mode .filter-section,
        body.dark-mode [style*="background: white"] {
            background: #2d2d2d !important;
            color: #ffffff;
            border-color: #404040;
        }
        
        body.dark-mode input,
        body.dark-mode select {
            background: #363636;
            color: #ffffff;
            border-color: #404040;
        }
        
        body.dark-mode input::placeholder {
            color: #999;
        }
        
        body.dark-mode .btn-outline {
            background: transparent;
            border-color: var(--secondary);
            color: var(--secondary);
        }
        
        body.dark-mode .btn-outline:hover {
            background: var(--secondary);
            color: #ffffff;
        }
        
        body.dark-mode .btn-primary {
            background: var(--secondary);
            color: white;
        }
        
        body.dark-mode .btn-primary:hover {
            background: var(--primary-light);
        }
        
        body.dark-mode .badge {
            color: white;
        }
        
        body.dark-mode .badge.success {
            background: #1b5e3f;
            color: white;
        }
        
        body.dark-mode .badge.warning {
            background: #7f5300;
            color: white;
        }
        
        body.dark-mode .empty-state {
            background: #2d2d2d;
        }
        
        body.dark-mode .empty-state h2,
        body.dark-mode .empty-state p {
            color: #ffffff;
        }
        
        body.dark-mode .sidebar-footer {
            border-top-color: #404040;
        }
        
        body.dark-mode .logo,
        body.dark-mode .logo span {
            color: #ffffff;
        }

        /* Stats Cards for Dashboard */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        
        .stat-icon {
            width: 60px;
            height: 60px;
            background: var(--gray-100);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }
        
        .stat-details h3 {
            font-size: 14px;
            color: var(--gray-500);
            margin-bottom: 5px;
        }
        
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 5px;
        }
        
        .stat-trend {
            font-size: 12px;
            color: var(--gray-500);
        }
        
        .stat-trend.positive {
            color: var(--success);
        }
        
        /* Recent Analyses */
        .recent-analyses {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .section-header h2 {
            font-size: 18px;
            font-weight: 600;
        }
        
        .view-all {
            color: var(--secondary);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }
        
        .analyses-table {
            overflow-x: auto;
        }
        
        .analyses-table table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .analyses-table th {
            text-align: left;
            padding: 12px;
            font-size: 13px;
            font-weight: 500;
            color: var(--gray-500);
            border-bottom: 2px solid var(--gray-200);
        }
        
        .analyses-table td {
            padding: 16px 12px;
            border-bottom: 1px solid var(--gray-200);
            font-size: 14px;
        }
        
        .confidence-cell {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .confidence-bar {
            width: 80px;
            height: 6px;
            background: var(--gray-200);
            border-radius: 10px;
            overflow: hidden;
        }
        
        .confidence-bar div {
            height: 100%;
            background: var(--secondary);
            border-radius: 10px;
        }
        
        /* Quick Actions */
        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 30px;
        }
        
        .action-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid var(--gray-200);
        }
        
        .action-card:hover {
            transform: translateY(-5px);
            border-color: var(--secondary);
            box-shadow: 0 10px 25px rgba(43,110,240,0.1);
        }
        
        .action-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .action-card h4 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .action-card p {
            font-size: 12px;
            color: var(--gray-500);
        }
        
        /* Region Cards */
        .region-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin: 30px 0;
        }
        
        .region-card {
            background: white;
            border-radius: 24px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        
        .region-card:hover {
            transform: translateY(-5px);
            border-color: var(--secondary);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        
        .region-card.active {
            border-color: var(--secondary);
            background: #f0f7ff;
        }
        
        .region-icon {
            font-size: 64px;
            margin-bottom: 15px;
        }
        
        .region-name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        /* Rules Card */
        .rules-card {
            background: white;
            border-radius: 24px;
            padding: 30px;
            margin: 20px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        
        .rules-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .rules-list {
            list-style: none;
            padding: 0;
        }
        
        .rules-list li {
            padding: 8px 0;
            padding-left: 25px;
            position: relative;
        }
        
        .rules-list li:before {
            content: "✓";
            color: var(--secondary);
            position: absolute;
            left: 0;
            font-weight: bold;
        }
        
        /* Example Images */
        .examples-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin: 20px 0;
        }
        
        .example-card {
            background: var(--gray-50);
            border-radius: 16px;
            padding: 15px;
            text-align: center;
            border: 1px solid var(--gray-200);
        }
        
        .example-icon {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .example-label {
            font-size: 13px;
            font-weight: 500;
        }
        
        .example-desc {
            font-size: 11px;
            color: var(--gray-500);
            margin-top: 5px;
        }
        
        /* Upload Button */
        .upload-trigger {
            text-align: center;
            margin: 30px 0;
        }
        
        .upload-trigger-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px 48px;
            border-radius: 60px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 10px 20px rgba(10,37,64,0.2);
        }
        
        .upload-trigger-btn:hover {
            background: var(--primary-light);
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(43,110,240,0.3);
        }
        
        /* Upload Section */
        .upload-section {
            background: white;
            border-radius: 24px;
            padding: 30px;
            margin: 20px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        
        .upload-area {
            border: 2px dashed var(--gray-300);
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .upload-area:hover {
            border-color: var(--secondary);
            background: var(--gray-50);
        }
        
        .upload-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }
        
        /* Preview Section */
        .preview-section {
            margin: 20px 0;
        }
        
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .preview-item {
            background: var(--gray-50);
            border-radius: 16px;
            padding: 15px;
            position: relative;
            border: 1px solid var(--gray-200);
        }
        
        .preview-image {
            width: 100%;
            height: 120px;
            background: var(--gray-200);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 10px;
            overflow: hidden;
        }
        
        .preview-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .preview-name {
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 5px;
            word-break: break-word;
        }
        
        .preview-size {
            font-size: 10px;
            color: var(--gray-500);
        }
        
        .preview-remove {
            position: absolute;
            top: 5px;
            right: 5px;
            background: white;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        /* Results Card */
        .results-card {
            background: white;
            border-radius: 24px;
            padding: 30px;
            margin: 20px 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        
        .result-table {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }
        
        .result-table th,
        .result-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid var(--gray-200);
        }
        
        .result-table th {
            background: var(--gray-100);
            font-weight: 600;
        }
        
        /* History Table */
        .history-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 16px;
            overflow: hidden;
        }
        
        .history-table th {
            background: var(--primary);
            color: white;
            padding: 12px;
            text-align: left;
        }
        
        .history-table td {
            padding: 12px;
            border-bottom: 1px solid var(--gray-200);
        }
        
        .history-table tr:hover {
            background: var(--gray-50);
        }
        
        .badge {
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 500;
        }
        
        .badge.success {
            background: #e0f2e9;
            color: var(--success);
        }
        
        .badge.warning {
            background: #fff3e0;
            color: var(--warning);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }
        
        .empty-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
        
        .btn {
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-outline {
            background: transparent;
            border: 2px solid var(--primary);
            color: var(--primary);
        }
        
        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }
        
        .btn-icon {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--gray-100);
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.2s;
        }
        
        .btn-icon:hover {
            background: var(--secondary);
            color: white;
        }
        
        .header-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .settings-icon {
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: all 0.2s;
        }
        
        .settings-icon:hover {
            background: var(--gray-100);
            transform: rotate(30deg);
        }
        
        /* Mode selection styles */
        .mode-option {
            transition: all 0.2s;
        }
        
        .mode-option:hover {
            background: var(--gray-100);
            transform: translateY(-2px);
        }
        
        .mode-option.selected-mode {
            border-color: var(--secondary) !important;
            background: #f0f7ff;
            box-shadow: 0 4px 10px rgba(43,110,240,0.1);
        }
        
        body.dark-mode .mode-option.selected-mode {
            background: #363636;
            border-color: var(--secondary) !important;
        }
        
        body.dark-mode .mode-option:hover {
            background: #404040;
        }
        
        /* Filter Section */
        .filter-section {
            background: white;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: 15px;
        }
        
        .filter-input {
            padding: 10px 15px;
            border: 1px solid var(--gray-300);
            border-radius: 30px;
            font-size: 14px;
        }
        
        .filter-input:focus {
            outline: none;
            border-color: var(--secondary);
        }
        
        .filter-select {
            padding: 10px 15px;
            border: 1px solid var(--gray-300);
            border-radius: 30px;
            font-size: 14px;
            background: white;
            cursor: pointer;
        }
        
        .filter-select:focus {
            outline: none;
            border-color: var(--secondary);

        /* Filter Section Styles */
.filter-section {
    background: white;
    border-radius: 16px;
    padding: 20px;
    margin: 20px 0;
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr auto;
    gap: 10px;
    align-items: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.05);
}

.filter-input {
    padding: 10px 15px;
    border: 1px solid var(--gray-300);
    border-radius: 30px;
    font-size: 14px;
    width: 100%;
    transition: all 0.2s;
}

.filter-input:focus {
    outline: none;
    border-color: var(--secondary);
    box-shadow: 0 0 0 3px rgba(43,110,240,0.1);
}

.filter-select {
    padding: 10px 15px;
    border: 1px solid var(--gray-300);
    border-radius: 30px;
    font-size: 14px;
    background: white;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
}

.filter-select:focus {
    outline: none;
    border-color: var(--secondary);
}

/* Dark mode styles for filters */
body.dark-mode .filter-section {
    background: #2d2d2d;
    border-color: #404040;
}

body.dark-mode .filter-input,
body.dark-mode .filter-select {
    background: #363636;
    color: #ffffff;
    border-color: #404040;
}

body.dark-mode .filter-input::placeholder {
    color: #999;
}

body.dark-mode .filter-input:focus,
body.dark-mode .filter-select:focus {
    border-color: var(--secondary);
}
        
        /* Education Content Styles */
        .content-tabs {
            display: flex;
            gap: 8px;
            margin: 15px 0;
            flex-wrap: wrap;
            border-bottom: 2px solid #e0e0e0;
            padding-bottom: 10px;
        }
        
        .tab-btn {
            padding: 10px 18px;
            border: none;
            background: #f0f0f0;
            color: #666;
            border-radius: 8px 8px 0 0;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }
        
        .tab-btn:hover {
            background: #e8e8e8;
        }
        
        .tab-btn.active {
            background: var(--primary);
            color: white;
            border-bottom: 3px solid var(--secondary);
        }
        
        #educationContent,
        #contentTabs {
            animation: fadeIn 0.3s ease-in-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .education-panel {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin: 15px 0;
        }
        
        .study-guide-section,
        .doctor-guide-section,
        .patient-info-section {
            margin-bottom: 20px;
        }
        
        .study-guide-section h3,
        .doctor-guide-section h3,
        .patient-info-section h3 {
            color: var(--primary);
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .content-box {
            background: white;
            border-radius: 8px;
            padding: 15px;
            border-left: 4px solid var(--secondary);
        }
        
        .study-guide,
        .doctor-guide,
        .patient-info-section .content-box {
            font-size: 14px;
            line-height: 1.6;
            color: #333;
        }
        
        .study-guide h2,
        .doctor-guide h2 {
            font-size: 18px;
            color: var(--primary);
            margin-bottom: 15px;
        }
        
        .study-guide h4,
        .doctor-guide h4 {
            font-size: 16px;
            color: #333;
            margin-top: 15px;
            margin-bottom: 10px;
        }
        
        .study-guide p,
        .doctor-guide p {
            margin-bottom: 12px;
            line-height: 1.6;
        }
        
        .study-guide ul,
        .doctor-guide ul {
            margin-left: 20px;
            margin-bottom: 15px;
        }
        
        .study-guide li,
        .doctor-guide li {
            margin-bottom: 8px;
            color: #555;
        }
        
        .study-guide a,
        .doctor-guide a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        
        .study-guide a:hover,
        .doctor-guide a:hover {
            text-decoration: underline;
        }
        
        .patient-info-section ul {
            margin-left: 20px;
            margin: 12px 0;
        }
        
        .patient-info-section li {
            margin-bottom: 8px;
            color: #555;
        }
        
        .clinical-section {
            background: #f0f5f9;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border-left: 4px solid #2196F3;
        }
        
        body.dark-mode #educationContent {
            background: #2d2d2d;
            color: #e0e0e0;
        }
        
        body.dark-mode .content-box {
            background: #363636;
            color: #e0e0e0;
            border-left-color: var(--secondary);
        }
        
        body.dark-mode .tab-btn {
            background: #363636;
            color: #b0b0b0;
        }
        
        body.dark-mode .tab-btn.active {
            background: var(--primary);
            color: white;
        }
        
        /* Toast animations */
        @keyframes slideIn {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        @keyframes slideOut {
            from {
                transform: translateY(0);
                opacity: 1;
            }
            to {
                transform: translateY(100%);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">⚕️</span>
                    <span>MediScan</span>
                    <span class="logo-badge">AI</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-label">MAIN</div>
                <a href="#" class="nav-item active" data-view="overview" onclick="showOverviewView(); return false;">
                    <span class="nav-icon">📊</span>
                    <span>Medical Scan Analysis</span>
                </a>
                <a href="#" class="nav-item" data-view="general" onclick="showGeneralScanView(); return false;">
                    <span class="nav-icon">🔬</span>
                    <span>General Scan</span>
                </a>
                <a href="#" class="nav-item" data-view="history" onclick="showHistoryView(); return false;">
                    <span class="nav-icon">📋</span>
                    <span>History</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="#" class="nav-item" onclick="toggleSettings(); return false;">
                    <span class="nav-icon">⚙️</span>
                    <span>Settings</span>
                </a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main" id="mainContent"></main>
    </div>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
            <h2><span>⚙️</span> Settings</h2>
            <button class="settings-close" onclick="toggleSettings()">✕</button>
        </div>
        
        <div class="settings-content">
            <!-- USER MODE SECTION -->
            <div class="settings-section">
                <h3>
                    <span>👤</span>
                    User Mode
                </h3>
                <div class="settings-item">
                    <div>
                        <div class="settings-item-label">Select Your Role</div>
                        <div class="settings-item-desc">Content adapts to your needs</div>
                    </div>
                </div>
                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <label style="flex: 1; text-align: center; padding: 10px; border: 2px solid var(--gray-300); border-radius: 30px; cursor: pointer; transition: all 0.2s;" 
                           class="mode-option" onclick="setUserMode('public')">
                        <input type="radio" name="userMode" value="public" style="display: none;">
                        <div style="font-size: 24px; margin-bottom: 5px;">👥</div>
                        <div style="font-weight: 600;">Public</div>
                        <div style="font-size: 11px; color: var(--gray-500);">Basic info & recommendations</div>
                    </label>
                    <label style="flex: 1; text-align: center; padding: 10px; border: 2px solid var(--gray-300); border-radius: 30px; cursor: pointer; transition: all 0.2s;"
                           class="mode-option" onclick="setUserMode('doctor')">
                        <input type="radio" name="userMode" value="doctor" style="display: none;">
                        <div style="font-size: 24px; margin-bottom: 5px;">👨‍⚕️</div>
                        <div style="font-weight: 600;">Doctor</div>
                        <div style="font-size: 11px; color: var(--gray-500);">Treatments & medications</div>
                    </label>
                    <label style="flex: 1; text-align: center; padding: 10px; border: 2px solid var(--gray-300); border-radius: 30px; cursor: pointer; transition: all 0.2s;"
                           class="mode-option" onclick="setUserMode('student')">
                        <input type="radio" name="userMode" value="student" style="display: none;">
                        <div style="font-size: 24px; margin-bottom: 5px;">📚</div>
                        <div style="font-weight: 600;">Student</div>
                        <div style="font-size: 11px; color: var(--gray-500);">Educational notes & mechanisms</div>
                    </label>
                </div>
            </div>

            <!-- GENERAL SECTION -->
            <div class="settings-section">
                <h3>
                    <span>🔧</span>
                    General
                </h3>
                <div class="settings-item">
                    <div>
                        <div class="settings-item-label">Dark Mode</div>
                        <div class="settings-item-desc">Switch theme</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="darkMode" onchange="toggleDarkMode()">
                        <span class="slider"></span>
                    </label>
                </div>
                <div class="settings-item">
                    <div>
                        <div class="settings-item-label">Auto-save Results</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="autoSave" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <!-- ANALYSIS SECTION -->
            <div class="settings-section">
                <h3>
                    <span>🔬</span>
                    Analysis
                </h3>
                <div class="settings-item">
                    <div>
                        <div class="settings-item-label">High Resolution Mode</div>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="highRes">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <!-- REPORTS SECTION -->
            <div class="settings-section">
                <h3>
                    <span>📋</span>
                    Reports
                </h3>
                <div class="settings-item">
                    <div>
                        <div class="settings-item-label">Default Export</div>
                    </div>
                    <select id="exportFormat" style="padding: 6px 12px; border-radius: 20px;">
                        <option value="csv">CSV</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="settings-footer">
            <button class="save-btn" onclick="saveSettings()">💾 Save Settings</button>
        </div>
    </div>

    <!-- Link to external JavaScript -->
    <script src="js/disease_details.js"></script>
    <script src="js/diagnosis.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
