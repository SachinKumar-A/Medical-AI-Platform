<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard · MediScan AI</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="dashboard-sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">⚕️</span>
                    <span>MediScan</span>
                    <span class="logo-badge">AI</span>
                </div>
            </div>
            
            <!-- REMOVED: Doctor name section -->
            <!-- Sidebar user section removed -->

            <nav class="sidebar-nav">
                <div class="nav-label">MAIN</div>
                <a href="#" class="nav-item" data-view="dashboard">
                    <span class="nav-icon">📊</span>
                    <span>Dashboard</span>
                </a>
                <a href="#" class="nav-item" data-view="analysis">
                    <span class="nav-icon">🔬</span>
                    <span>New Analysis</span>
                </a>
                <a href="#" class="nav-item" data-view="history">
                    <span class="nav-icon">📋</span>
                    <span>History</span>
                </a>

                <div class="nav-label">DISEASES</div>
                <a href="#" class="nav-item disease-item" data-disease="brain">
                    <span class="nav-icon">🧠</span>
                    <span>Brain Tumor</span>
                </a>
                <a href="#" class="nav-item disease-item" data-disease="chest">
                    <span class="nav-icon">🫁</span>
                    <span>Chest X-Ray</span>
                </a>
                <a href="#" class="nav-item disease-item" data-disease="pneumonia">
                    <span class="nav-icon">🌬️</span>
                    <span>Pneumonia</span>
                </a>
                <a href="#" class="nav-item disease-item" data-disease="covid">
                    <span class="nav-icon">🦠</span>
                    <span>COVID-19</span>
                </a>
                <a href="#" class="nav-item disease-item" data-disease="breast">
                    <span class="nav-icon">🎗️</span>
                    <span>Breast Cancer</span>
                </a>
                <a href="#" class="nav-item disease-item" data-disease="retinopathy">
                    <span class="nav-icon">👁️</span>
                    <span>Diabetic Retinopathy</span>
                </a>
                <a href="#" class="nav-item disease-item" data-disease="skin">
                    <span class="nav-icon">🔬</span>
                    <span>Skin Cancer</span>
                </a>
                <a href="#" class="nav-item disease-item" data-disease="bone">
                    <span class="nav-icon">🦴</span>
                    <span>Bone Fracture</span>
                </a>
                <a href="#" class="nav-item disease-item" data-disease="liver">
                    <span class="nav-icon">🧬</span>
                    <span>Liver Disease</span>
                </a>
                <a href="#" class="nav-item disease-item" data-disease="kidney">
                    <span class="nav-icon">🔴</span>
                    <span>Kidney Stone</span>
                </a>
            </nav>

            <div class="sidebar-footer">
    <div style="padding: 20px 24px; font-size: 12px; color: var(--gray-400); text-align: center;">
        MediScan AI v2.0
    </div>
</div>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main" id="mainContent">
            <!-- Dynamic content will be loaded here via JavaScript -->
            <div style="text-align: center; padding: 50px;">
                <h2>Loading dashboard...</h2>
            </div>
        </main>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
