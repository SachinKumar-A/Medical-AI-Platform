<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Medical AI - Login</title>
    <style>
        :root {
            --bg: #eef4ff;
            --panel: #ffffff;
            --line: #d7e1ef;
            --text: #14213d;
            --muted: #5b6c87;
            --brand: #0f766e;
            --brand2: #0284c7;
            --danger: #b91c1c;
            --ok: #166534;
            --tab-idle-bg: #f8fafc;
            --tab-idle-text: #1e293b;
            --tab-active-bg: #0f172a;
            --tab-active-text: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background:
                radial-gradient(circle at 18% 20%, rgba(14, 165, 233, 0.2), transparent 35%),
                radial-gradient(circle at 82% 15%, rgba(15, 118, 110, 0.18), transparent 32%),
                linear-gradient(125deg, #eef4ff, #f8fbff 50%, #ecfeff);
            display: grid;
            place-items: center;
            padding: 16px;
        }

        .card {
            width: 100%;
            max-width: 500px;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 20px;
            box-shadow: 0 20px 44px rgba(13, 32, 61, 0.14);
            overflow: hidden;
        }

        .head {
            padding: 22px;
            background: linear-gradient(120deg, var(--brand), var(--brand2));
            color: white;
        }

        .head h1 {
            margin: 0;
            font-size: 25px;
            letter-spacing: 0.3px;
        }

        .head p {
            margin: 8px 0 0;
            opacity: 0.95;
            font-size: 14px;
        }

        .body { padding: 20px; }

        .tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .tab {
            border: 1px solid var(--line);
            border-radius: 12px;
            background: var(--tab-idle-bg);
            color: var(--tab-idle-text);
            padding: 11px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.5);
        }

        .tab:hover {
            transform: translateY(-1px);
            border-color: #93c5fd;
        }

        .tab.active {
            background: var(--tab-active-bg);
            border-color: var(--tab-active-bg);
            color: var(--tab-active-text);
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.22);
        }

        .field { margin-bottom: 13px; }

        label {
            display: block;
            font-size: 13px;
            color: var(--muted);
            font-weight: 600;
            margin-bottom: 6px;
        }

        input, select, button {
            width: 100%;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 11px 12px;
            font-size: 14px;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: 2px solid rgba(56, 189, 248, 0.45);
            border-color: #60a5fa;
        }

        button {
            border: none;
            background: linear-gradient(120deg, var(--brand), var(--brand2));
            color: #fff;
            font-weight: 700;
            cursor: pointer;
            margin-top: 4px;
            box-shadow: 0 8px 18px rgba(2, 132, 199, 0.26);
        }

        button:hover {
            filter: brightness(0.98);
            transform: translateY(-1px);
        }

        .msg {
            margin-top: 12px;
            min-height: 20px;
            font-size: 13px;
            font-weight: 600;
        }

        .msg.error { color: var(--danger); }
        .msg.ok { color: var(--ok); }

        .hint {
            margin-top: 10px;
            font-size: 12px;
            color: #64748b;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="head">
            <h1>Medical AI Login</h1>
            <p>Register or login with your real email and password.</p>
        </div>

        <div class="body">
            <div class="tabs">
                <button id="tabLogin" class="tab active" type="button">Login</button>
                <button id="tabRegister" class="tab" type="button">Register</button>
            </div>

            <div class="field">
                <label for="email">Email</label>
                <input id="email" type="email" autocomplete="email" />
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input id="password" type="password" autocomplete="current-password" />
            </div>

            <div class="field">
                <label for="role">Category</label>
                <select id="role">
                    <option value="doctor">Doctor</option>
                    <option value="public">Public</option>
                    <option value="student">Student</option>
                </select>
            </div>

            <button id="submitBtn" type="button">Login</button>
            <div id="msg" class="msg"></div>
            <div class="hint">Use category exactly for that account: Doctor, Public, or Student.</div>
        </div>
    </div>

    <script>
        const tabLogin = document.getElementById('tabLogin');
        const tabRegister = document.getElementById('tabRegister');
        const submitBtn = document.getElementById('submitBtn');
        const msg = document.getElementById('msg');

        let mode = 'login';

        function setMode(nextMode) {
            mode = nextMode;
            tabLogin.classList.toggle('active', mode === 'login');
            tabRegister.classList.toggle('active', mode === 'register');
            submitBtn.textContent = mode === 'login' ? 'Login' : 'Register';
            msg.textContent = '';
            msg.className = 'msg';
        }

        tabLogin.addEventListener('click', () => setMode('login'));
        tabRegister.addEventListener('click', () => setMode('register'));

        async function submitAuth() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;

            msg.textContent = '';
            msg.className = 'msg';

            if (!email || !password || !role) {
                msg.textContent = 'Please fill all fields.';
                msg.classList.add('error');
                return;
            }

            const endpoint = mode === 'login' ? '/auth/login' : '/auth/register';

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, role }),
                });

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'Request failed');
                }

                if (mode === 'register') {
                    msg.textContent = 'Registration successful. Now login with same details.';
                    msg.classList.add('ok');
                    setMode('login');
                } else {
                    msg.textContent = 'Login successful. Redirecting...';
                    msg.classList.add('ok');
                    window.location.href = data.redirect || '/app';
                }
            } catch (error) {
                msg.textContent = error.message;
                msg.classList.add('error');
            }
        }

        submitBtn.addEventListener('click', submitAuth);
    </script>
</body>
</html>
